# fly.toml app configuration file generated for lukebouch-com on 2023-09-26T14:17:46-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "lukebouch-com"
kill_signal = "SIGINT"
kill_timeout = 5
mounts = []
primary_region = "iad"
processes = []

[build]

[env]
PORT = "8080"

[[services]]
internal_port = 8080
processes = ["app"]
protocol = "tcp"
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0

[services.concurrency]
hard_limit = 25
soft_limit = 20
type = "connections"

[[services.ports]]
force_https = true
handlers = ["http"]
port = 80

[[services.ports]]
handlers = ["tls", "http"]
port = 443
